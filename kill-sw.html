<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Mise à jour Chronos...</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#05080f;color:#e2e8f0;font-family:sans-serif;text-align:center;padding:20px}
  .msg{font-size:18px;margin-bottom:12px}
  .sub{font-size:13px;color:#64748b}
</style>
</head>
<body>
<div>
  <div style="font-size:48px;margin-bottom:16px">🔄</div>
  <div class="msg">Mise à jour en cours...</div>
  <div class="sub" id="status">Nettoyage du cache...</div>
</div>
<script>
async function killAndRedirect() {
  const s = document.getElementById('status');

  // 1. Supprimer tous les caches
  try {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    s.textContent = 'Caches supprimés (' + keys.length + ')...';
  } catch(e) { s.textContent = 'Cache non accessible...'; }

  // 2. Désactiver tous les service workers
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    s.textContent = 'Service worker désactivé...';
  } catch(e) {}

  // 3. Rediriger vers l'app avec cache-bust
  s.textContent = 'Redirection...';
  setTimeout(() => {
    window.location.replace('/chronos/?v=' + Date.now());
  }, 800);
}

if ('serviceWorker' in navigator) {
  killAndRedirect();
} else {
  window.location.replace('/chronos/?v=' + Date.now());
}
</script>
</body>
</html>
